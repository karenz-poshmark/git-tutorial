<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Click Counter</h1>
    <p class="subtitle">A simple app to practice git with</p>

    <div class="counter-box">
      <span id="count">0</span>
      <p>clicks</p>
    </div>

    <div class="buttons">
      <button id="increment" class="btn btn-primary">+ Add</button>
      <button id="decrement" class="btn btn-secondary">- Subtract</button>
      <button id="reset" class="btn btn-danger">Reset</button>
    </div>

    <div class="history">
      <h2>History</h2>
      <ul id="history-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
